<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DEEB KIDS - Fun & Safe Games</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&family=Space+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-color: #f0fff0;      /* Soft Mint Background */
    --primary: #39ff14;     /* Bright Neon Green */
    --secondary: #ff9d00;   /* Fun Orange */
    --text: #1a1a1a;
    --card: #ffffff;
  }

  body {
    background-color: var(--bg-color);
    color: var(--text);
    font-family: 'Fredoka', sans-serif; /* Rounded, friendly font */
    margin: 0;
    padding: 0;
    text-align: center;
  }

  /* Fun Header */
  header {
    background: var(--primary);
    padding: 3rem 1rem;
    border-bottom-left-radius: 50px;
    border-bottom-right-radius: 50px;
    box-shadow: 0 10px 0 rgba(0,0,0,0.05);
  }

  .logo { font-size: 3rem; font-weight: 700; color: white; text-shadow: 3px 3px 0px var(--text); }
  
  .back-link {
    display: inline-block;
    margin-top: 1rem;
    color: white;
    text-decoration: none;
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    background: rgba(0,0,0,0.2);
    padding: 5px 15px;
    border-radius: 20px;
  }

  section { padding: 4rem 2rem; }

  /* Game Card */
  .game-container {
    background: var(--card);
    border: 5px solid var(--primary);
    border-radius: 30px;
    max-width: 500px;
    margin: 0 auto;
    padding: 2rem;
    box-shadow: 10px 10px 0px var(--secondary);
    transition: transform 0.2s;
  }

  .game-container:hover { transform: scale(1.05) rotate(-1deg); }

  h2 { font-size: 2.5rem; color: var(--secondary); margin-bottom: 10px; }
  
  .btn {
    display: inline-block;
    background: var(--primary);
    color: white;
    padding: 15px 40px;
    border-radius: 50px;
    text-decoration: none;
    font-weight: 700;
    font-size: 1.5rem;
    margin-top: 20px;
    box-shadow: 0 5px 0 #28cc00;
  }

  .btn:active { box-shadow: none; transform: translateY(5px); }

  .safety-badge {
    margin-top: 3rem;
    display: inline-block;
    background: white;
    padding: 10px 20px;
    border-radius: 15px;
    font-size: 0.9rem;
    border: 2px solid #ddd;
  }
</style>
</head>
<body>

<header>
  <div class="logo">DEEB KIDS</div>
  <p style="color: white; font-weight: 500;">Safe • Fun • Free</p>
  <a href="index.html" class="back-link">← BACK TO MAIN STUDIO</a>
</header>

<section>
  <div class="game-container">
    <div style="font-size: 4rem;">💎</div>
    <h2>RuneTap</h2>
    <p>Tap the runes, collect points, and unlock cool stuff! No ads, no scary bits, just fun.</p>
    <a href="#" class="btn">PLAY NOW!</a>
  </div>

  <div class="safety-badge">
    🛡️ <strong>Sibling Safe:</strong> No microtransactions or ID tracking.
  </div>
</section>

</body>
</html>
