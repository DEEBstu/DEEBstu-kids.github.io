<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dubious Games - Kids Zone</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&family=Space+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff;
    --green: #39ff14;
    --dark: #050505;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--dark);
    font-family: 'Fredoka', sans-serif;
    text-align: center;
  }

  header {
    background: var(--dark);
    color: var(--green);
    padding: 4rem 1rem;
    border-bottom: 10px solid var(--green);
  }

  .logo { font-family: 'Space Mono', monospace; font-size: 2.5rem; letter-spacing: 3px; font-weight: bold; }

  .portal-link {
    display: inline-block;
    margin-top: 1.5rem;
    color: var(--green);
    text-decoration: none;
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    border: 1px solid var(--green);
    padding: 8px 20px;
  }

  section { padding: 5rem 2rem; }

  .game-card {
    background: white;
    border: 4px solid var(--dark);
    border-radius: 30px;
    max-width: 450px;
    margin: 0 auto;
    padding: 3rem;
    box-shadow: 12px 12px 0px var(--green);
  }

  .game-icon {
    width: 100px;
    height: 100px;
    object-fit: contain;
    image-rendering: pixelated;
    margin-bottom: 1.5rem;
  }

  h2 { font-size: 3rem; margin-bottom: 1rem; }
  p { font-size: 1.1rem; line-height: 1.6; color: #444; margin-bottom: 2rem; }
  
  .play-btn {
    display: inline-block;
    background: var(--green);
    color: var(--dark);
    padding: 20px 50px;
    border-radius: 50px;
    text-decoration: none;
    font-weight: 700;
    font-size: 1.5rem;
    border: 3px solid var(--dark);
    box-shadow: 0 6px 0 var(--dark);
  }

  footer {
    padding: 3rem;
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    opacity: 0.6;
  }
</style>
</head>
<body>

<header>
  <div class="logo">DUBIOUS GAMES</div>
  <p style="color: white; font-weight: bold; margin-top: 5px;">KIDS ZONE</p>
  <a href="https://dubiousgames.github.io/dub.github.io/" class="portal-link">← BACK TO MAIN SITE</a>
</header>

<section>
  <div class="game-card">
    <img src="button clicker icon.png" alt="RuneTap Icon" class="game-icon">
    <h2>RuneTap</h2>
    <p>The ultimate pixel-art clicker! Collect energy, unlock upgrades, and beat your high score.</p>
    <a href="https://deebstu.itch.io/button-clicker-runetap" target="_blank" class="play-btn">PLAY NOW</a>
  </div>
</section>

<footer>
  DUBIOUS GAMES // EST. 2025
</footer>

</body>
</html>
